<!DOCTYPE html>
<html lang="en">

<head>
    <title>Planewalking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="index.css">
</head>

<body>
    <header>
        <button onclick="menuBtn()">Hamburguesa</button>
        <ul id="menuList" class="hidden">
            <li><a href="..">Go back</a></li>
        </ul>
    </header>
    <h1>Planewalking</h1>

    <div id="loading">
        <p>Loading plane data...</p>
        <p>Please be patient or rebel to your Internet company.</p>
    </div>

    <div id="error" class="hidden">
        <p>Oh no, error happened:</p>
        <p id="pError"></p>
    </div>

    <div id="start" class="hidden">
        <div>
            <button onclick="start()">Start</button>
        </div>
    </div>

    <div id="planewalk" class="hidden">
        <div class="plane">
            <img id="planeBg" src="" />
            <p id="planeName"></p>
            <p id="planeType"></p>
            <p id="planeOracle"></p>
            <p id="planeChaos"></p>
        </div>
        <button onclick="loadNextPlane()">Planeswalk</button>
    </div>
    
    <script type="text/javascript" src="util.js"></script>

    <!-- Menu thing -->
    <script>
        var menuList = document.getElementById("menuList");
        function menuBtn() {
            menuList.classList.toggle('hidden');
        } 
    </script>

    <!-- Load plane -->
    <script type="text/javascript" src="loadplanes.js"></script>

</body>

</html>
